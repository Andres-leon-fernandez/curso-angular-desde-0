<h1>DragonBall page</h1>
<hr />
<section class="row">
  <div class="col-12 col-sm-6">
    <app-character-add (newCharacter)="dragonBallService.addCharacter($event)"></app-character-add>
  </div>
  <div class="col-12 col-sm-6">
    <app-character-list
      [listName]="'Listado de Personajes'"
      [characters]="dragonBallService.characters()"
    ></app-character-list>
  </div>
</section>
